name: Package Storefront and Upload to Google Drive

on:
  # schedule:
  #   # Run daily at 10 AM (2 AM)UTC
  #   - cron: "0 10 * * *"
  workflow_dispatch:

# Use concurrency to ensure that only a single job or workflow using the same concurrency group will run at a time
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true  # Cancel previously queued jobs and run the latest
      
jobs:
  self-hosted-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      runner-status: ${{ steps.runnerstatus.outputs.status }}
    steps:
      - name: Check runner status
        id: runnerstatus
        uses: SatelCreative/satel-gh-runner-check@1.0.3
        with:       
          github-runner-token: ${{ secrets.SELF_HOSTED_RUNNER_TOKEN }} # Should have access to manage runner
          org-name: SatelCreative

  package-and-upload:
    needs: [self-hosted-status]
    # Only run scheduled jobs in the template repository
    # Manual and PR triggers will always run in all repositories
    if: |
      github.repository == 'SatelCreative/repo-template'
    timeout-minutes: 10
    runs-on: ${{ contains(needs.self-hosted-status.outputs.runner-status, 'online') && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Create zip archive
        id: create-zip
        run: |
          DATE=$(date +'%Y-%m-%d')
          ZIP_NAME="[CLEAN-THEME] ${DATE}.zip"
          cd storefront
          zip -r "../${ZIP_NAME}" . -x "*.git*" "node_modules/*" "*.lock"
          cd ..
          echo "ZIP_FILE=${ZIP_NAME}" >> $GITHUB_ENV
          echo "zip_file=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "Created zip file: ${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Validate token before upload
        run: |
          python google-drive/validate_token.py
        env:
          GOOGLE_DRIVE_OAUTH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN }}
        continue-on-error: false

      - name: Upload to Google Drive
        run: |
          python google-drive/upload_to_drive.py
        env:
          ZIP_FILE: ${{ env.ZIP_FILE }}
          GOOGLE_DRIVE_OAUTH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: Cleanup
        if: always()
        run: |
          if [ -n "${{ env.ZIP_FILE }}" ]; then
            rm -f "${{ env.ZIP_FILE }}"
            echo "✅ Cleaned up local zip file: ${{ env.ZIP_FILE }}"
          fi

  notify-main-branch-fail:
    runs-on: ${{ contains(needs.self-hosted-status.outputs.runner-status, 'online') && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    needs: [self-hosted-status, package-and-upload]
    if: github.ref == 'refs/heads/main' && failure()
    steps:
      - uses: technote-space/workflow-conclusion-action@v3.0.3

      - name: Check which step failed
        id: check-failure
        run: |
          # Check if package-and-upload job failed
          if [ "${{ needs.package-and-upload.result }}" == "failure" ]; then
            echo "failed_job=package-and-upload" >> $GITHUB_OUTPUT
            # Most likely token issue if validation or upload step failed
            echo "likely_token_error=true" >> $GITHUB_OUTPUT
          else
            echo "failed_job=unknown" >> $GITHUB_OUTPUT
            echo "likely_token_error=false" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification
        if: ${{ env.WORKFLOW_CONCLUSION == 'failure' }}
        uses: 8398a7/action-slack@v3.18.0
        with:
          status: custom
          custom_payload: |
            {
              "text": "🚨 Storefront Deployment Failed",
              "attachments": [{
                "color": "${{ steps.check-failure.outputs.likely_token_error == 'true' && 'danger' || 'warning' }}",
                "fields": [{
                  "title": "Failed Job",
                  "value": "${{ steps.check-failure.outputs.failed_job }}",
                  "short": true
                }, {
                  "title": "Workflow Run",
                  "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>",
                  "short": true
                }${{ steps.check-failure.outputs.likely_token_error == 'true' && format(',{{"title":"⚠️ Action Required","value":"The OAuth token likely expired. To fix:\n\n1. Run: `python google-drive/generate_oauth_token.py`\n2. Copy the JSON output\n3. Update `GOOGLE_DRIVE_OAUTH_TOKEN` secret in GitHub\n\n**To prevent 2-week expiration:**\n• Publish your OAuth app:\n  https://console.cloud.google.com/apis/credentials/consent\n  → Click \"PUBLISH APP\"","short":false}}') || format(',{{"title":"Details","value":"Check the workflow logs for full error details.","short":false}}') }}]
              }]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
