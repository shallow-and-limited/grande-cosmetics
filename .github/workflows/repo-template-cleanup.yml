name: Template Cleanup

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cleanup:
    if: github.repository != 'SatelCreative/repo-template'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove template-only files
        run: |
          rm -rf \
            .github/workflows/storefront-deploy_clean_theme.yml \
            google-drive \
            .github/workflows/repo-template-cleanup.yml

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open cleanup pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Remove template-only automation"
          branch: chore/remove-template-automation
          delete-branch: true
          title: "Remove template-only automation"
          body: |
            This pull request removes the Google Drive packaging workflow, supporting scripts, and the cleanup workflow itself.
            Merge this PR to finish setting up the repository derived from the template.

      - name: No changes detected
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No template files needed removal."
